# Kubernetes Deployment for the NST SDC cluster (rancher.nstsdc.org).
# See docs/DEPLOYMENT.md for the full step-by-step walkthrough.
#
# Image pushed automatically by .github/workflows/build-and-push.yml on every
# push to main — see that workflow's run logs for the exact tag if this ever
# needs to be re-pointed at a fork.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensource-tracker
  namespace: opensource-tracker
  labels:
    app: opensource-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensource-tracker
  template:
    metadata:
      labels:
        app: opensource-tracker
    spec:
      containers:
        - name: opensource-tracker
          image: ghcr.io/saiudayagiri/opensource_nst_tracker-k8s:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: opensource-tracker-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          # Raised from the original 100m/500m request/limit after measuring
          # real CPU throttling in production use: rendering the ~1,900-student
          # leaderboard page is CPU-heavy (large JSON parse + big React tree),
          # and cgroup stats (cat /sys/fs/cgroup/cpu.stat inside the pod) showed
          # the container spending more time throttled than actually running
          # at the old 500m limit. See docs/DEPLOYMENT.md for how to check this
          # yourself if pages feel slow again after scaling up the roster.
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
      # No imagePullSecrets needed — the GHCR package is public. If it's ever
      # made private, see docs/DEPLOYMENT.md for how to add one back.
