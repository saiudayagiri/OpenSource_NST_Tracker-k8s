name: Refresh Leaderboard Cache

# Manual-only: refresh-cache.yml already runs the incremental refresh every 15
# minutes and shares the same GitHub token. Running this full reseed loop on
# a schedule too caused both workflows to burst requests against the same
# 30 req/min GitHub Search rate limit at once, so student refreshes would
# intermittently fail with "GitHub rate limit exceeded". Trigger manually
# from the Actions tab when a full reseed is actually needed.
on:
  workflow_dispatch: # Allow manual triggering from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Refresh Script
        run: node scripts/seed-all.js
        env:
          # Points at this repo's own deployment (K8s cluster), not the
          # original Vercel app — set the APP_URL secret in this repo's
          # Settings > Secrets and variables > Actions. See docs/DEPLOYMENT.md.
          BASE_URL: ${{ secrets.APP_URL }}
